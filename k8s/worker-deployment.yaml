apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: ai-task-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      containers:
      - name: worker
        image: rageenawahab/ai-worker:v1  # Updated to your image
        env:
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: MONGO_URI
          value: "mongodb://mongodb:27017/aitasks"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"